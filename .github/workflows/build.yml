# NOTE: STORING CACHE REQUIRES THE RUN TO SUCCEED, SO IF IT'S FAILING, TRY TEMPORARILY REMOVING ALL THE STEPS BELOW THIS LINE

    - name: Cache Vulkan SDK
      id: cache-vulkan-sdk
      uses: actions/cache@v5
      with:
        path: "C:\\VulkanSDK\\${{env.VULKAN_VERSION}}"
        key: VulkanSDK
    - name: Install Vulkan SDK
      if: steps.cache-vulkan-sdk.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        echo "VULKAN_SDK=C:\VulkanSDK\${{env.VULKAN_VERSION}}" >> $env:GITHUB_ENV
        Invoke-WebRequest -Method Get -Uri "https://github.com/ThreeDeeJay/VKQB3DV/releases/download/Dependencies/VulkanSDK-1.1.114-Installer.exe" -OutFile VulkanSDK.exe -UseBasicParsing
        Start-Process -Wait ./VulkanSDK.exe -ArgumentList "/S"
